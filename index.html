<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tilt Smash</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root { --bg-color: #000; }
        * { box-sizing: border-box; -webkit-touch-callout: none; margin: 0; padding: 0; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg-color); font-family: -apple-system, sans-serif; color: white; user-select: none; position: fixed; }
        
        #game-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; }
        canvas { display: block !important; width: 100% !important; height: 100% !important; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        #timer-display { font-size: 3.5rem; font-weight: 200; letter-spacing: 4px; }
        
        #pause-btn { position: absolute; top: 20px; left: 20px; z-index: 20; padding: 10px 20px; background: #333; border-radius: 20px; pointer-events: auto; cursor: pointer; }

        .menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.95); z-index: 100; text-align: center; }
        button { margin: 10px; padding: 16px 40px; background: white; color: black; border: none; border-radius: 25px; font-size: 0.9rem; font-weight: bold; letter-spacing: 2px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-layer">
            <div id="timer-display"></div>
        </div>
        <div id="pause-btn" onclick="togglePause()">PAUSE</div>

        <div id="overlay" class="menu">
            <h1>TILT SMASH</h1>
            <button onclick="startGame(true)">Enter</button>
            <button onclick="startGame(false)">Practice Mode</button>
        </div>

        <div id="pause-menu" class="menu" style="display:none;">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">Resume</button>
            <button onclick="location.reload()">Quit</button>
        </div>
    </div>

    <script>
        const { Engine, Render, Runner, Bodies, Composite, Events, Body } = Matter;
        let engine, render, runner, balls = [], isTimed = true, gameActive = false, isPaused = false;
        let currentLevel = 1, timeLeft = 20, timerInterval;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(type === 'hit' ? 0.3 : 0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function startGame(timed) {
            isTimed = timed;
            document.getElementById('overlay').style.display = 'none';
            init();
        }

        function init() {
            const w = window.innerWidth, h = window.innerHeight;
            engine = Engine.create();
            render = Render.create({ 
                element: document.getElementById('game-container'), 
                engine: engine, 
                options: { width: w, height: h, wireframes: false, background: 'transparent', pixelRatio: window.devicePixelRatio } 
            });
            
            addBall();
            spawnLevel(w, h);
            Render.run(render);
            runner = Runner.create(); Runner.run(runner, engine);
            gameActive = true;
            if (isTimed) startTimer();
            else document.getElementById('timer-display').style.display = 'none';

            Events.on(engine, 'beforeUpdate', () => {
                balls.forEach(ball => {
                    const b = ball.position, v = ball.velocity;
                    if (b.x < 12) { Body.setPosition(ball, {x: 12, y: b.y}); Body.setVelocity(ball, {x: -v.x * 0.5, y: v.y}); }
                    else if (b.x > w - 12) { Body.setPosition(ball, {x: w - 12, y: b.y}); Body.setVelocity(ball, {x: -v.x * 0.5, y: v.y}); }
                    if (b.y < 12) { Body.setPosition(ball, {x: b.x, y: 12}); Body.setVelocity(ball, {x: v.x, y: -v.y * 0.5}); }
                    else if (b.y > h - 12) { Body.setPosition(ball, {x: b.x, y: h - 12}); Body.setVelocity(ball, {x: v.x, y: -v.y * 0.5}); }
                });
            });
        }

        function addBall() {
            const b = Bodies.circle(window.innerWidth/2, window.innerHeight/2, 12, { restitution: 0.8, friction: 0, frictionAir: 0, render: { fillStyle: '#fff' } });
            balls.push(b);
            Composite.add(engine.world, b);
        }

        function spawnLevel(w, h) {
            for(let i = 0; i < 6 + currentLevel; i++) {
                // Integer-based positions to prevent blur
                const x = Math.floor(50 + Math.random()*(w-100));
                const y = Math.floor(160 + Math.random()*(h-280));
                Composite.add(engine.world, Bodies.rectangle(x, y, 64, 28, { isStatic: true, label: 'brick', render: { fillStyle: '#fff' } }));
            }
        }

        function levelWin() {
            currentLevel++;
            if (currentLevel % 8 === 0) addBall();
            if (isTimed) timeLeft += Math.max(2, 12 - currentLevel);
            spawnLevel(window.innerWidth, window.innerHeight);
        }

        function togglePause() {
            isPaused = !isPaused;
            engine.enabled = !isPaused;
            document.getElementById('pause-menu').style.display = isPaused ? 'flex' : 'none';
        }

        function startTimer() { timerInterval = setInterval(() => { timeLeft--; document.getElementById('timer-display').innerText = timeLeft; if (timeLeft <= 0) alert('Game Over'); }, 1000); }

        window.addEventListener('devicemotion', (e) => {
            if (gameActive && !isPaused) {
                engine.gravity.x = -e.accelerationIncludingGravity.x * 0.6;
                engine.gravity.y = e.accelerationIncludingGravity.y * 0.6;
            }
        });
    </script>
</body>
</html>
